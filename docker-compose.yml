services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intvyom-api
    ports:
      # Map host PORT -> container PORT (the app listens on process.env.PORT)
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
      MONGO_URI: ${MONGO_URI}
    restart: unless-stopped
